<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Potability Predictor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0d47a1 0%, #1565c0 50%, #0288d1 100%); min-height: 100vh; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
  .header { background: linear-gradient(135deg, #0d47a1, #0288d1); color: white; padding: 30px; text-align: center; }
  .header h1 { font-size: 2rem; margin-bottom: 8px; }
  .header p { opacity: 0.85; font-size: 1rem; }
  .form-section { padding: 30px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-weight: 600; color: #1565c0; font-size: 0.9rem; }
  .who-standard { font-size: 0.75rem; color: #666; }
  input[type=range] { width: 100%; accent-color: #1565c0; cursor: pointer; }
  .val-display { display: flex; justify-content: space-between; font-size: 0.85rem; }
  .val-display span { font-weight: 700; color: #0d47a1; }
  .btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #0d47a1, #0288d1); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 24px; transition: transform 0.2s, opacity 0.2s; }
  .btn:hover { transform: translateY(-2px); opacity: 0.9; }
  .result-box { margin-top: 24px; padding: 24px; border-radius: 12px; text-align: center; display: none; }
  .result-box.potable { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border: 2px solid #4CAF50; }
  .result-box.not-potable { background: linear-gradient(135deg, #ffebee, #ffcdd2); border: 2px solid #F44336; }
  .result-label { font-size: 2rem; font-weight: 800; }
  .result-prob { font-size: 1rem; margin-top: 8px; color: #555; }
  .prob-bar { height: 12px; background: #e0e0e0; border-radius: 6px; margin-top: 12px; overflow: hidden; }
  .prob-fill { height: 100%; border-radius: 6px; transition: width 1s ease; }
  .prob-fill.safe { background: linear-gradient(90deg, #4CAF50, #81C784); }
  .prob-fill.unsafe { background: linear-gradient(90deg, #F44336, #EF9A9A); }
  .model-badge { display: inline-block; background: #e3f2fd; color: #1565c0; padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; margin-top: 16px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>💧 Water Potability Predictor</h1>
    <p>AI-powered water safety assessment using Gradient Boosting (89.3% accuracy)</p>
  </div>
  <div class="form-section">
    <div class="grid" id="sliders">
      {% for key, info in features.items() %}
      <div class="field">
        <label>{{ info.label }}</label>
        <span class="who-standard">WHO Standard: {{ info.who }}</span>
        <div class="val-display">
          <span id="{{ key }}_val">{{ info.default }}</span>
        </div>
        <input type="range" id="{{ key }}" name="{{ key }}"
               min="{{ info.min }}" max="{{ info.max }}" step="{{ info.step }}"
               value="{{ info.default }}"
               oninput="document.getElementById('{{ key }}_val').textContent = parseFloat(this.value).toFixed(2)">
      </div>
      {% endfor %}
    </div>
    <button class="btn" onclick="predict()">🔍 Predict Water Safety</button>
    <div class="result-box" id="result">
      <div class="result-label" id="result-label"></div>
      <div class="result-prob" id="result-prob"></div>
      <div class="prob-bar"><div class="prob-fill" id="prob-fill"></div></div>
      <div class="model-badge">Model: Gradient Boosting (Tuned) | F1: 0.893 | AUC: ~0.96</div>
    </div>
  </div>
</div>
<script>
async function predict() {
  const features = ['ph','Hardness','Solids','Chloramines','Sulfate','Conductivity','Organic_carbon','Trihalomethanes','Turbidity'];
  const data = {};
  features.forEach(f => { data[f] = parseFloat(document.getElementById(f).value); });
  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const result = await res.json();
    const box = document.getElementById('result');
    box.style.display = 'block';
    box.className = 'result-box ' + (result.potable ? 'potable' : 'not-potable');
    document.getElementById('result-label').textContent = result.label;
    document.getElementById('result-prob').textContent = `Probability of being potable: ${result.probability}%`;
    const fill = document.getElementById('prob-fill');
    fill.style.width = result.probability + '%';
    fill.className = 'prob-fill ' + (result.potable ? 'safe' : 'unsafe');
  } catch(e) {
    alert('Prediction failed: ' + e.message);
  }
}
</script>
</body>
</html>
